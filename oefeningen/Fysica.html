<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fysica escaperoom</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#2b2b2b;
    }

    /* MAIN COMPUTER SCREEN */
    .screen{
      width:2000px;
      height:1100px;
      background:#45a5ff;
      border:16px solid #111;
      border-radius:25px;
      padding:40px;
      display:flex;
      flex-direction:column;
      gap:35px;
      box-shadow:0 0 40px rgba(0,0,0,0.7);
    }

    /* TITLE */
    h1{
      text-align:center;
      font-size:110px;
      font-weight:normal;
      color:black;
    }

    /* TOP COMPONENT BAR */
    .components{
      background:#293772;
      height:230px;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:40px;
      padding:20px;
    }

    .component-box{
      width:190px;
      height:170px;
      background:#88308d;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .component{
      background:#37916f;
      display:flex;
      justify-content:center;
      align-items:center;
      color:black;
    }

    .resistor,
    .battery{
      width:160px;
      height:65px;
      font-size:30px;
    }

    .lamp{
      width:120px;
      height:120px;
      border-radius:50%;
      font-size:30px;
    }
    .volt,
    .amp{
      width:120px;
      height:120px;
      border-radius:50%;
      font-size:50px;
    }

    /* MAIN EXERCISE AREA */
    .exercise-area{
      flex-grow:1;
      background:#776eab;
      position:relative;
      overflow:hidden;
    }

    /* WIRES */
    .wire{
      position:absolute;
      background:white;
    }

    .horizontal{
      height:5px;
    }

    .vertical{
      width:5px;
    }

    /* PINK COMPONENT SPOTS */
    .drop{
      position:absolute;
      background:#ea7b9a;
    }

  </style>
</head>
<body>

  <div class="screen">

    <h1>Maak een serie schakeling</h1>

    <!-- COMPONENTS -->
    <div class="components">

      <div class="component-box">
        <div class="component resistor">weerstand</div>
      </div>

      <div class="component-box">
        <div class="component lamp">Lamp</div>
      </div>

      <div class="component-box">
        <div class="component volt">V</div>
      </div>

      <div class="component-box">
        <div class="component amp">A</div>
      </div>

      <div class="component-box">
        <div class="component battery">Baterij</div>
      </div>

    </div>

    <!-- EXERCISE -->
    <div class="exercise-area">

      <!-- TOP MAIN WIRE -->
      <div class="wire horizontal"
        style="top:50px; left:420px; width:900px;">
      </div>

      <!-- LEFT MAIN -->
      <div class="wire vertical"
        style="top:50px; left:420px; height:280px;">
      </div>

      <!-- RIGHT MAIN -->
      <div class="wire vertical"
        style="top:50px; left:1320px; height:280px;">
      </div>

      <!-- MIDDLE -->
      <div class="wire horizontal"
        style="top:330px; left:420px; width:230px;">
      </div>

      <div class="wire horizontal"
        style="top:330px; left:860px; width:465px;">
      </div>

      <!-- LEFT OUTSIDE -->
      <div class="wire horizontal"
        style="top:180px; left:180px; width:245px;">
      </div>

      <div class="wire vertical"
        style="top:180px; left:180px; height:300px;">
      </div>

      <!-- RIGHT OUTSIDE -->
      <div class="wire horizontal"
        style="top:180px; left:1320px; width:225px;">
      </div>

      <div class="wire vertical"
        style="top:180px; left:1540px; height:305px;">
      </div>

      <!-- BOTTOM -->
      <div class="wire horizontal"
        style="top:480px; left:180px; width:1360px;">
      </div>

      <!-- SMALL INNER CIRCUIT -->
      <div class="wire vertical"
        style="top:200px; left:650px; height:220px;">
      </div>

      <div class="wire vertical"
        style="top:200px; left:860px; height:220px;">
      </div>

      <div class="wire horizontal"
        style="top:200px; left:650px; width:210px;">
      </div>

      <div class="wire horizontal"
        style="top:420px; left:650px; width:215px;">
      </div>

      <!-- PINK BOXES -->

      <!-- TOP LEFT -->
      <div class="drop"
        style="top:10px; left:500px; width:200px; height:80px;">
      </div>

      <!-- TOP RIGHT -->
      <div class="drop"
        style="top:10px; left:1020px; width:200px; height:80px;">
      </div>

      <!-- CENTER -->
      <div class="drop"
        style="top:155px; left:690px; width:140px; height:80px;">
      </div>

      <!-- BOTTOM CENTER -->
      <div class="drop"
        style="top:390px; left:690px; width:140px; height:80px;">
      </div>

      <!-- BOTTOM LONG -->
      <div class="drop"
        style="top:440px; left:900px; width:280px; height:80px;">
      </div>

      <!-- RIGHT -->
      <div class="drop"
        style="top:320px; left:1480px; width:130px; height:80px;">
      </div>

    </div>

  </div>

</body>
</html>
