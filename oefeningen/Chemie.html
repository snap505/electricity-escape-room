<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body class="chemie-page">
    <div class="screen">
        <h1> Chemie </h1>
        <div class="exercise-container">
            <!-- OEFENING 1-->
            <div class="exercise-card active">
                <h2> oefening 1 </h2>

                <div class="section">
                    <h3> gegeven </h3>

                    <p> HNO₃ </p>
                    <p> massa = 63,01 g </p>
                </div>

                <div class="section">
                    <h3> gevraagd </h3>

                    <p> aantal mol </p>
                </div>

                <div class="section">
                    <h3> oplossing </h3>

                    <input type="text">
                    <span> mol </span>
                </div>

            </div>

            <!-- OEFENING 2-->
            <div class="exercise-card">
                <h2> oefening 2 </h2>

                <div class="section">
                    <h3> gegeven </h3>

                    <p> CuSO₄ </p>
                    <p> mol = 0,023 </p>
                    <p> opgelost in 1 liter water </p>
                </div>

                <div class="section">
                    <h3> gevraagd </h3>

                    <p> massaconcentratie </p>
                </div>

                <div class="section">
                    <h3> oplossing </h3>

                    <input type="text" placeholder="typ je antwoord hier">
                </div>
            </div>
            <!-- OEFENING 3-->
            <div class="exercise-card">
            <h2> oefening 3 </h2>

            <div class="section">
                <h3> gegeven </h3>

                <p> CaCO₃ </p>
                <p> mol = 12 </p>
            </div>

            <div class="section">
                <h3> gevraagd </h3>

                <p> aantal deeltjes </p>
            </div>

            <div class="section">
                <h3> oplossing </h3>

                <input type="text" placeholder="typ je antwoord hier">
            </div>

            </div>
        </div>
    </div>
    
<script src="../script.js"></script>
</body>
</html>
